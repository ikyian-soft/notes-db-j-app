<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notes DB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container mt-2 border-bottom mb-4">
        <h2 class="row">
            <div class="title col-9">Notes DB: Notes</div>
            <div class="col-3 d-flex justify-content-end">
                <a th:href="@{/logout}" class="btn btn-outline-secondary btn-sm">logout</a>
                <a th:href="@{/create}" class="btn btn-primary btn-sm ms-2">new</a>
            </div>
        </h2>
        <div class="fst-italic">User: <span th:text="${username}" class="fw-bolder"></span></div>
    </div>
    <div class="container">
        <div class="notes">
            <div class="note" th:each="note: ${notes}" th:object="${note}">
                <div class="title fw-bolder" th:text="*{title}"></div>
                <div class="content fst-italic" th:text="*{content}" ></div>
                <div class="commands d-flex justify-content-end">
                    <a th:href="@{/delete/{id}(id=*{id})}" class="btn btn-sm btn-danger">delete</a>
                    <a th:href="@{/edit/{id}(id=*{id})}" class="btn btn-sm btn-success ms-2">edit</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
